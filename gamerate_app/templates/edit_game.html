<h2>Edit Game</h2>
<form method="POST">
    {% csrf_token %}
    <label>Title:</label>
    <input type="text" name="title" value="{{ game.title }}"><br>

    <label>Genre:</label>
    <input type="text" name="genre" value="{{ game.genre }}"><br>

    <label>Rating:</label>
    <input type="number" name="rating" value="{{ game.rating }}"><br>

    <label>Release Year:</label>
    <input type="number" name="release_year" value="{{ game.release_year }}"><br>

    <label>Developer:</label>
    <input type="text" name="developer" value="{{ game.developer }}"><br>

    <label>Description:</label>
    <textarea name="description">{{ game.description }}</textarea><br>

    <label>Image URL:</label>
    <input type="text" name="image" value="{{ game.image }}"><br>

    <button type="submit">Save</button>
</form>
