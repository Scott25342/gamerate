{% extends 'base.html' %}

{% block title_block %}Edit Review{% endblock %}

{% block body_block %}
<h1 class="page-title">Edit Review</h1>

<div class="card form-card">
	<form method="POST">
		{% csrf_token %}

		<label>Rating</label>
		<input type="number" name="rating" value="{{ review.rating }}">

		<label>Review</label>
		<textarea name="review_text">{{ review.review_text }}</textarea>

		<button type="submit">Save</button>
	</form>
</div>
{% endblock %}
