{% extends 'base.html' %}

{% block title_block %}
Login
{% endblock %}

{% block body_block %}
<h1>Login to GameRate</h1>

<form id="login_form" method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {{ form.as_p }}
    <input type="submit" value="Login" />
</form>
{% endblock %}
