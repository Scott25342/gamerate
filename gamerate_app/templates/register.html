{% extends 'base.html' %}

{% block title_block %}
Register
{% endblock %}

{% block body_block %}
<div class="auth-page">
<h1 class="page-title">Register for GameRate</h1>

{% if registered %}
<div class="card auth-card">
    <p><strong>Thanks for registering.</strong></p>
    <p><a href="{% url 'login' %}">Login now</a> or return to <a href="{% url 'home' %}">home</a>.</p>
</div>
{% else %}
<div class="card auth-card">
    <form id="register_form" method="post" action="{% url 'register' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Register" />
    </form>
</div>
{% endif %}
</div>
{% endblock %}
